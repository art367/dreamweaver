<script>
// ═══════════════════════════════════════════════
// DREAMWEAVER — Guided Sleep Hypnosis v2
// ═══════════════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const breathCanvas = document.getElementById('breathCanvas');
const breathCtx = breathCanvas.getContext('2d');
let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  const bSize = Math.min(300, Math.min(W, H) * 0.45);
  breathCanvas.width = bSize; breathCanvas.height = bSize;
}
resize(); window.addEventListener('resize', resize);
function lerp(a,b,t){return a+(b-a)*t}
function rand(a,b){return Math.random()*(b-a)+a}
function easeInOut(t){return t<0.5?2*t*t:-1+(4-2*t)*t}

// ═══════════════════════════════════════════════
// SPEECH SYNTHESIS — Robust Female Voice
// ═══════════════════════════════════════════════
const synth = window.speechSynthesis;
let chosenVoice = null;
let voiceLoaded = false;
let speakQueue = [];
let isSpeaking = false;
let isPaused = false;

// We try hard to find a good female English voice
function pickVoice() {
  const all = synth.getVoices();
  if (!all.length) return null;
  const en = all.filter(v => v.lang.startsWith('en'));

  // Tier 1: known good female names
  const tier1 = ['Samantha','Karen','Moira','Fiona','Tessa','Serena',
    'Victoria','Martha','Shelley','Catherine','Zira','Hazel',
    'Google UK English Female','Jenny','Aria','Sara','Salli','Joanna','Kendra','Kimberly','Amy','Emma','Danielle'];
  for (const name of tier1) {
    const v = en.find(x => x.name.toLowerCase().includes(name.toLowerCase()));
    if (v) return v;
  }
  // Tier 2: any English voice with 'female' in name
  const fem = en.find(v => /female/i.test(v.name));
  if (fem) return fem;
  // Tier 3: any English voice
  if (en.length) return en[0];
  // Last resort
  return all[0];
}

function loadVoices() {
  const v = pickVoice();
  if (v) {
    chosenVoice = v;
    voiceLoaded = true;
    console.log('Voice selected:', v.name, v.lang);
  }
}

// Voices load async in most browsers
synth.onvoiceschanged = loadVoices;
loadVoices(); // try immediately too

// Chrome/Edge bug: speech stops after ~15s. Fix: pause+resume periodically.
let keepAliveId = null;
function startKeepAlive() {
  if (keepAliveId) return;
  keepAliveId = setInterval(() => {
    if (synth.speaking && !synth.paused) {
      synth.pause(); synth.resume();
    }
  }, 5000);
}

// Core speak function — queues lines and plays them serially
function speakLine(text, rate, onDone) {
  // Cancel anything lingering
  synth.cancel();

  // Re-check voices (some browsers need this after cancel)
  if (!voiceLoaded) loadVoices();

  const utter = new SpeechSynthesisUtterance(text);
  if (chosenVoice) utter.voice = chosenVoice;
  utter.lang = 'en-US';
  utter.rate = rate || 0.82;
  utter.pitch = 1.0;
  utter.volume = 1.0;

  isSpeaking = true;

  utter.onend = () => {
    isSpeaking = false;
    if (onDone) onDone();
  };
  utter.onerror = (e) => {
    console.warn('Speech error:', e.error);
    isSpeaking = false;
    if (onDone) onDone();
  };

  // Small delay to ensure cancel() has cleared
  setTimeout(() => {
    synth.speak(utter);
    startKeepAlive();
  }, 100);
}

// Warm up speech engine with a silent utterance (required on some mobile browsers)
function warmUpSpeech() {
  const warm = new SpeechSynthesisUtterance('');
  warm.volume = 0;
  warm.rate = 2;
  if (chosenVoice) warm.voice = chosenVoice;
  synth.speak(warm);
}


// ═══════════════════════════════════════════════
// AMBIENT SOUNDSCAPE — Rain, Water, Wind, Chimes
// No drones. Pure nature.
// ═══════════════════════════════════════════════
let audioCtx, masterGain;
let audioReady = false;

function initAudio() {
  if (audioReady) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);
  audioReady = true;

  createRain();
  createWater();
  createWind();
  scheduleChime();

  // Gentle fade in
  masterGain.gain.setTargetAtTime(0.55, audioCtx.currentTime, 3);
}

// ── Soft Rain ──
function createRain() {
  const bufLen = audioCtx.sampleRate * 4;
  const buf = audioCtx.createBuffer(2, bufLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < bufLen; i++) {
      // Shaped noise: mostly high frequencies for rain patter
      d[i] = (Math.random() * 2 - 1) * 0.5;
      // Random "drops" — occasional louder pops
      if (Math.random() < 0.001) d[i] *= 3;
    }
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;

  // Highpass to make it sound like rain, not static
  const hp = audioCtx.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 2000; hp.Q.value = 0.3;

  // Bandpass for soft patter character
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 4500; bp.Q.value = 0.4;

  const g = audioCtx.createGain();
  g.gain.value = 0.12;

  // Slow volume modulation (rain intensity ebbing)
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.04;
  const lfoG = audioCtx.createGain();
  lfoG.gain.value = 0.04;
  lfo.connect(lfoG); lfoG.connect(g.gain);
  lfo.start();

  src.connect(hp); hp.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start();
}

// ── Gentle Stream / Water ──
function createWater() {
  const bufLen = audioCtx.sampleRate * 6;
  const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  // Brown noise for water body
  let last = 0;
  for (let i = 0; i < bufLen; i++) {
    const white = Math.random() * 2 - 1;
    last = (last + (0.02 * white)) / 1.02;
    d[i] = last * 3.5;
  }

  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;

  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 600; lp.Q.value = 0.5;

  // Slow undulation
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.08;
  const lfoD = audioCtx.createGain();
  lfoD.gain.value = 150;
  lfo.connect(lfoD); lfoD.connect(lp.frequency);
  lfo.start();

  const g = audioCtx.createGain();
  g.gain.value = 0.18;

  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start();
}

// ── Soft Wind ──
function createWind() {
  const bufLen = audioCtx.sampleRate * 5;
  const buf = audioCtx.createBuffer(2, bufLen, audioCtx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    let v = 0;
    for (let i = 0; i < bufLen; i++) {
      v = (v + (0.01 * (Math.random() * 2 - 1))) / 1.01;
      d[i] = v * 5;
    }
  }
  const src = audioCtx.createBufferSource();
  src.buffer = buf; src.loop = true;

  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 350; bp.Q.value = 0.3;

  // Wind gusts — slow frequency sweep
  const lfo = audioCtx.createOscillator();
  lfo.type = 'sine'; lfo.frequency.value = 0.025;
  const lfoD = audioCtx.createGain();
  lfoD.gain.value = 200;
  lfo.connect(lfoD); lfoD.connect(bp.frequency);
  lfo.start();

  const g = audioCtx.createGain();
  g.gain.value = 0.1;

  // Volume swell for gusts
  const gLfo = audioCtx.createOscillator();
  gLfo.type = 'sine'; gLfo.frequency.value = 0.03;
  const gLfoD = audioCtx.createGain();
  gLfoD.gain.value = 0.05;
  gLfo.connect(gLfoD); gLfoD.connect(g.gain);
  gLfo.start();

  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start();
}

// ── Gentle Chimes (wind chimes / singing bowls) ──
function playChime() {
  if (!audioCtx || audioCtx.state === 'suspended') return;
  const t = audioCtx.currentTime;
  // Pentatonic/meditative notes
  const notes = [396, 528, 639, 741, 852, 432, 324];
  const freq = notes[Math.floor(Math.random() * notes.length)];

  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.value = freq;

  // Second harmonic for richness
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2.01; // slight detune for shimmer

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.025, t + 0.2);
  g.gain.setTargetAtTime(0, t + 0.8, 1.2);

  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.008, t + 0.15);
  g2.gain.setTargetAtTime(0, t + 0.6, 1.0);

  osc.connect(g); g.connect(masterGain);
  osc2.connect(g2); g2.connect(masterGain);
  osc.start(t); osc.stop(t + 6);
  osc2.start(t); osc2.stop(t + 5);
}

let chimeTmr;
function scheduleChime() {
  chimeTmr = setTimeout(() => {
    playChime();
    if (Math.random() < 0.25) setTimeout(playChime, rand(600, 1200));
    scheduleChime();
  }, rand(8000, 18000));
}

function setVolume(v) {
  if (masterGain) masterGain.gain.setTargetAtTime(v, audioCtx.currentTime, 0.3);
}


// ═══════════════════════════════════════════════
// HYPNOSIS SCRIPT
// ═══════════════════════════════════════════════
const SCRIPT = [

// ═══════════════════════════════════════════════
// SESSION ENGINE
// ═══════════════════════════════════════════════
let sessionActive = false;
let sessionPhase = 0;
let sessionLine = 0;
let globalTime = 0;
let dimLevel = 0;
let breathActive = false;
let breathCycle = { inhale: 4, hold: 2, exhale: 6 };

function showText(text) {
  const el = document.getElementById('guideWords');
  el.style.opacity = '0';
  setTimeout(() => { el.textContent = text; el.style.opacity = '1'; }, 600);
}
function hideText() {
  document.getElementById('guideWords').style.opacity = '0';
}

function startSession() {
  // Init both audio systems in user gesture
  initAudio();
  warmUpSpeech();
  if (!voiceLoaded) loadVoices();

  sessionActive = true;
  sessionPhase = 0;
  sessionLine = 0;
  dimLevel = 0;
  breathActive = true;

  // Fade out start screen
  const ss = document.getElementById('startScreen');
  ss.style.opacity = '0';
  setTimeout(() => { ss.style.pointerEvents = 'none'; }, 2000);

  document.getElementById('guideText').style.opacity = '1';
  document.getElementById('phaseLabel').style.opacity = '1';
  document.getElementById('controls').style.opacity = '1';

  // Brief loading message then start
  const vs = document.getElementById('voiceStatus');
  vs.textContent = 'preparing your guide...';
  vs.style.opacity = '1';

  setTimeout(() => {
    vs.style.opacity = '0';
    advanceScript();
  }, 2500);
}

function advanceScript() {
  if (!sessionActive || isPaused) return;
  if (sessionPhase >= SCRIPT.length) { finishSession(); return; }

  const phase = SCRIPT[sessionPhase];
  document.getElementById('phaseLabel').textContent = phase.phase;

  if (sessionLine >= phase.lines.length) {
    sessionPhase++;
    sessionLine = 0;
    setTimeout(() => advanceScript(), 3500);
    return;
  }

  const line = phase.lines[sessionLine];
  showText(line.text);

  // Calculate speech rate — gets slower as we go deeper
  const baseRate = 0.82;
  const slowdown = sessionPhase * 0.03;
  const rate = Math.max(0.7, baseRate - slowdown);

  speakLine(line.text, rate, () => {
    hideText();
    sessionLine++;

    // Progressive dimming
    const totalLines = SCRIPT.reduce((s, p) => s + p.lines.length, 0);
    const curr = SCRIPT.slice(0, sessionPhase).reduce((s, p) => s + p.lines.length, 0) + sessionLine;
    dimLevel = Math.min(0.85, (curr / totalLines) * 0.9);

    // Slow breathing for deeper phases
    if (sessionPhase >= 3) breathCycle = { inhale: 5, hold: 3, exhale: 7 };
    if (sessionPhase >= 4) breathCycle = { inhale: 5, hold: 3, exhale: 8 };

    setTimeout(() => advanceScript(), line.pause);
  });
}

function finishSession() {
  hideText();
  document.getElementById('phaseLabel').textContent = 'sleep well';
  dimLevel = 0.92;
  setTimeout(() => { dimLevel = 0.97; }, 15000);
  setTimeout(() => {
    document.getElementById('phaseLabel').style.opacity = '0';
    document.getElementById('controls').style.opacity = '0';
  }, 30000);
}

function togglePause() {
  isPaused = !isPaused;
  document.getElementById('pauseBtn').textContent = isPaused ? 'resume' : 'pause';
  if (isPaused) { synth.pause(); }
  else { synth.resume(); advanceScript(); }
}


// ═══════════════════════════════════════════════
// VISUALS: Particles, Mandala, Background
// ═══════════════════════════════════════════════
const particles = [];
function initParticles() {
  for (let i = 0; i < 70; i++) {
    particles.push({
      x: rand(0,W), y: rand(0,H),
      vx: rand(-0.12,0.12), vy: rand(-0.12,0.12),
      size: rand(1,2.5), alpha: rand(0,1),
      aSpd: rand(0.003,0.012), aDir: 1,
      hue: rand(250,300), glow: rand(15,40)
    });
  }
}

function updateParticles(dt) {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vx += rand(-0.004,0.004); p.vy += rand(-0.004,0.004);
    p.vx *= 0.999; p.vy *= 0.999;
    p.alpha += p.aSpd * p.aDir;
    if (p.alpha >= 1){p.alpha=1;p.aDir=-1}
    if (p.alpha <= 0){p.alpha=0;p.aDir=1;p.aSpd=rand(0.003,0.012)}
    if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
    if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
  }
}

function drawParticles() {
  for (const p of particles) {
    if (p.alpha < 0.01) continue;
    ctx.save(); ctx.globalAlpha = p.alpha * 0.7;
    const g = ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.glow);
    g.addColorStop(0,`hsla(${p.hue},60%,75%,0.3)`);
    g.addColorStop(1,'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.glow,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
    ctx.fillStyle=`hsla(${p.hue},50%,85%,${p.alpha})`;ctx.fill();
    ctx.restore();
  }
}

function drawBreathMandala(t) {
  if (!breathActive && !sessionActive) return;
  const bc = breathCanvas, bx = breathCtx;
  const s = bc.width, cx = s/2, cy = s/2;
  bx.clearRect(0,0,s,s);

  const cyc = breathCycle.inhale + breathCycle.hold + breathCycle.exhale;
  const tc = t % cyc;
  let bs;
  if (tc < breathCycle.inhale) bs = easeInOut(tc / breathCycle.inhale);
  else if (tc < breathCycle.inhale + breathCycle.hold) bs = 1;
  else bs = 1 - easeInOut((tc - breathCycle.inhale - breathCycle.hold) / breathCycle.exhale);

  const baseR = s*0.12, maxR = s*0.38;
  const radius = lerp(baseR, maxR, bs);

  // Outer glow
  bx.save(); bx.globalAlpha = 0.15 + bs*0.1;
  const og = bx.createRadialGradient(cx,cy,radius*0.8,cx,cy,radius*1.8);
  og.addColorStop(0,'rgba(180,140,220,0.15)'); og.addColorStop(1,'transparent');
  bx.fillStyle=og; bx.beginPath(); bx.arc(cx,cy,radius*1.8,0,Math.PI*2); bx.fill();
  bx.restore();

  // Petals
  for (let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2+t*0.1;
    bx.save(); bx.translate(cx,cy); bx.rotate(a);
    bx.globalAlpha=0.12+bs*0.08;
    bx.beginPath(); bx.ellipse(radius*0.5,0,radius*0.45,radius*0.15,0,0,Math.PI*2);
    bx.fillStyle=`hsla(${270+i*5},40%,70%,0.2)`; bx.fill(); bx.restore();
  }

  // Dots ring
  for(let i=0;i<12;i++){
    const a=(i/12)*Math.PI*2-t*0.15;
    const r=radius*0.85;
    bx.beginPath();bx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,1.5,0,Math.PI*2);
    bx.fillStyle=`rgba(200,180,230,${0.2+bs*0.2})`;bx.fill();
  }

  // Main ring
  bx.save(); bx.globalAlpha=0.25+bs*0.15;
  bx.beginPath();bx.arc(cx,cy,radius,0,Math.PI*2);
  bx.strokeStyle='rgba(180,140,220,0.4)';bx.lineWidth=1;bx.stroke();
  const ig=bx.createRadialGradient(cx,cy,0,cx,cy,radius);
  ig.addColorStop(0,`rgba(200,170,240,${0.06+bs*0.06})`);
  ig.addColorStop(0.7,`rgba(180,140,220,${0.02+bs*0.02})`);
  ig.addColorStop(1,'transparent'); bx.fillStyle=ig; bx.fill();
  bx.restore();

  // Center
  bx.beginPath();bx.arc(cx,cy,2+bs*2,0,Math.PI*2);
  bx.fillStyle=`rgba(220,200,250,${0.3+bs*0.3})`;bx.fill();

  // Label
  let lbl='';
  if(tc<breathCycle.inhale)lbl='breathe in';
  else if(tc<breathCycle.inhale+breathCycle.hold)lbl='hold';
  else lbl='breathe out';
  bx.save();bx.globalAlpha=0.35;
  bx.font=`${s*0.05}px 'Cormorant Garamond',serif`;
  bx.fillStyle='#c8b8d8';bx.textAlign='center';
  bx.fillText(lbl,cx,cy+radius+s*0.1);bx.restore();
}

function drawBackground(t) {
  const grad=ctx.createRadialGradient(W*0.5,H*0.5,0,W*0.5,H*0.5,Math.max(W,H)*0.8);
  grad.addColorStop(0,'#15112a');grad.addColorStop(0.5,'#0e0b1e');grad.addColorStop(1,'#07060d');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Nebula blobs
  const neb=[{x:W*0.25,y:H*0.3,r:200,h:275,s:0.3},{x:W*0.7,y:H*0.6,r:180,h:260,s:-0.15},{x:W*0.5,y:H*0.8,r:250,h:290,s:0.2}];
  for(const n of neb){
    const nx=n.x+Math.sin(t*n.s)*20,ny=n.y+Math.cos(t*n.s*0.7)*15;
    const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,n.r);
    ng.addColorStop(0,`hsla(${n.h},40%,25%,0.04)`);
    ng.addColorStop(0.5,`hsla(${n.h},30%,15%,0.02)`);
    ng.addColorStop(1,'transparent');
    ctx.fillStyle=ng;ctx.beginPath();ctx.arc(nx,ny,n.r,0,Math.PI*2);ctx.fill();
  }

  // Stars
  ctx.save();
  for(let i=0;i<50;i++){
    const sx=(i*173.7)%W,sy=(i*97.3)%H;
    const sa=0.08+Math.sin(t*0.5+i*3.7)*0.06;
    ctx.beginPath();ctx.arc(sx,sy,0.7,0,Math.PI*2);
    ctx.fillStyle=`rgba(200,190,220,${sa})`;ctx.fill();
  }
  ctx.restore();
}

// ═══════════════════════════════════════════════
// MAIN LOOP
// ═══════════════════════════════════════════════
let lastFrame = 0;
function render(ts) {
  requestAnimationFrame(render);
  const dt = Math.min(0.05, (ts - (lastFrame||ts)) / 1000);
  lastFrame = ts; globalTime += dt;

  drawBackground(globalTime);
  if(!particles.length) initParticles();
  updateParticles(dt); drawParticles();
  drawBreathMandala(globalTime);

  if(sessionActive){
    document.getElementById('dimmer').style.opacity = dimLevel;
  }
}

// ═══════════════════════════════════════════════
// EVENTS
// ═══════════════════════════════════════════════
document.getElementById('startBtn').addEventListener('click', startSession);
document.getElementById('startBtn').addEventListener('touchend', e=>{e.preventDefault();startSession()});
document.getElementById('pauseBtn').addEventListener('click', togglePause);
document.getElementById('volSlider').addEventListener('input', e=>setVolume(e.target.value/100));

// Wake lock
(async()=>{try{if('wakeLock' in navigator)await navigator.wakeLock.request('screen')}catch(e){}})();

requestAnimationFrame(render);
</script>
