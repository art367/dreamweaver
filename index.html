<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dreamweaver — Guided Sleep Hypnosis</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0612;font-family:'Cormorant Garamond',serif}
#app{width:100%;height:100%;position:relative}
#startScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;background:radial-gradient(ellipse at center,#1a1030 0%,#0a0612 70%);transition:opacity 1.5s ease}
#startScreen.hidden{opacity:0;pointer-events:none}
#startScreen h1{font-size:clamp(2rem,6vw,4rem);font-weight:300;color:#d4c5f0;letter-spacing:0.15em;margin-bottom:0.3em;text-shadow:0 0 40px rgba(180,140,255,0.3)}
#startScreen p{font-size:clamp(0.9rem,2.5vw,1.2rem);color:rgba(180,160,220,0.7);font-style:italic;margin-bottom:2em;letter-spacing:0.1em}
#startBtn{background:none;border:1px solid rgba(180,140,255,0.3);color:#d4c5f0;font-family:'Cormorant Garamond',serif;font-size:clamp(1rem,3vw,1.3rem);padding:0.8em 2.5em;border-radius:50px;cursor:pointer;letter-spacing:0.15em;transition:all 0.5s ease;backdrop-filter:blur(10px)}
#startBtn:hover{border-color:rgba(180,140,255,0.6);background:rgba(180,140,255,0.1);box-shadow:0 0 30px rgba(180,140,255,0.2)}
#sessionScreen{position:absolute;inset:0;opacity:0;transition:opacity 2s ease}
#sessionScreen.active{opacity:1}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#bgCanvas{z-index:1}
#mandalaCanvas{z-index:2}
#particleCanvas{z-index:3}
#subtitleBox{position:absolute;bottom:15%;left:50%;transform:translateX(-50%);z-index:10;text-align:center;width:85%;max-width:600px;pointer-events:none}
#subtitleText{font-size:clamp(1rem,3vw,1.5rem);font-weight:300;color:rgba(212,197,240,0.9);font-style:italic;line-height:1.8;letter-spacing:0.08em;text-shadow:0 0 20px rgba(140,100,200,0.4);opacity:0;transition:opacity 1.5s ease}
#subtitleText.visible{opacity:1}
#controls{position:absolute;bottom:3%;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:20px;opacity:0.6;transition:opacity 0.5s}
#controls:hover{opacity:1}
.ctrl-btn{background:none;border:1px solid rgba(180,140,255,0.25);color:rgba(212,197,240,0.7);font-family:'Cormorant Garamond',serif;font-size:0.85rem;padding:0.4em 1.2em;border-radius:20px;cursor:pointer;letter-spacing:0.1em;transition:all 0.3s}
.ctrl-btn:hover{border-color:rgba(180,140,255,0.5);color:#d4c5f0}
.ctrl-btn.active{background:rgba(180,140,255,0.15);border-color:rgba(180,140,255,0.5)}
#volSlider,#restartSlider{-webkit-appearance:none;width:80px;height:2px;background:rgba(180,140,255,0.3);border-radius:2px;outline:none}
#volSlider::-webkit-slider-thumb,#restartSlider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:rgba(212,197,240,0.7);cursor:pointer}
#volLabel,#restartLabel{font-size:0.75rem;color:rgba(180,160,220,0.5);letter-spacing:0.1em;display:flex;align-items:center;gap:8px}
#dimOverlay{position:absolute;inset:0;background:#0a0612;opacity:0;z-index:5;pointer-events:none;transition:opacity 3s ease}
#loadingMsg{position:absolute;bottom:8%;left:50%;transform:translateX(-50%);z-index:15;color:rgba(180,160,220,0.5);font-size:0.85rem;font-style:italic;letter-spacing:0.1em;opacity:0;transition:opacity 1s}
#loadingMsg.visible{opacity:1}
</style>
</head>
<body>
<div id="app">
  <div id="startScreen">
    <h1>Dreamweaver</h1>
    <p>a guided journey into sleep</p>
    <button id="startBtn">Begin</button>
  </div>
  <div id="sessionScreen">
    <canvas id="bgCanvas"></canvas>
    <canvas id="mandalaCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
    <div id="dimOverlay"></div>
    <div id="subtitleBox">
      <div id="subtitleText"></div>
    </div>
    <div id="loadingMsg"></div>
    <div id="controls">
      <button class="ctrl-btn" id="pauseBtn">Pause</button>
      <label id="volLabel">Volume
        <input type="range" id="volSlider" min="0" max="100" value="70">
      </label>
      <label id="restartLabel">Restart
        <input type="range" id="restartSlider" min="0" max="100" value="0">
      </label>
    </div>
  </div>
</div>
<script>
// Line 0 = "Welcome to Dreamweaver" (intro)
// Lines 1-38 = guided script
const LINES = [
  "Welcome… to Dreamweaver…",
  "Close your eyes… and take a slow… deep breath in.",
  "Hold it gently… and now… release… letting everything… go.",
  "You're safe here… There is nothing to do… nowhere to be… just this moment.",
  "Let the weight of the day… dissolve… like mist… fading in warm light.",
  "With each breath… you're sinking… a little deeper… into softness.",
  "Now bring your attention… to your forehead… Feel it… smooth… and open.",
  "Let your eyes grow heavy… so heavy… like velvet curtains… closing.",
  "Your jaw softens… your lips part gently… all the tension… melting away.",
  "Feel a warm wave… of relaxation… flowing down through your neck… your shoulders… dropping… releasing.",
  "Your arms grow heavy… and warm… your hands… open and soft… fingers gently… uncurling.",
  "This warmth spreads… through your chest… your belly softens… each breath… draws you deeper.",
  "Down through your hips… your legs growing heavy… pleasantly heavy… sinking into the bed.",
  "All the way down… to your toes… a gentle tingling… as every last bit of tension… dissolves.",
  "Now imagine… you're standing… at the top of a beautiful staircase… made of moonlight.",
  "With each step down… you drift… twice as deep… into perfect relaxation.",
  "Ten… stepping down… deeper… and deeper.",
  "Nine… the air is soft… and warm… around you.",
  "Eight… every muscle… letting go… completely.",
  "Seven… you're floating now… weightless… and free.",
  "Six… the world above… grows quiet… and distant.",
  "Five… halfway down… so deeply… relaxed.",
  "Four… a beautiful peace… washing over you.",
  "Three… almost there… drifting… floating.",
  "Two… so deep… so calm… so safe.",
  "One… you've arrived… in the most peaceful place… you've ever known.",
  "You find yourself… in an enchanted garden… bathed in soft… violet moonlight.",
  "Fireflies drift lazily… around you… their light pulsing… in rhythm with your heartbeat.",
  "A gentle stream… whispers nearby… its melody… ancient… and familiar.",
  "The air smells… of lavender… and night jasmine… every breath… fills you with calm.",
  "Soft moss beneath you… cradling you… as if the earth itself… is holding you.",
  "The stars above… swirl slowly… like a great cosmic lullaby… just for you.",
  "You are so deeply relaxed now… there's nothing left… to think about.",
  "My voice is becoming softer… more distant… like a whisper… on the wind.",
  "You don't need to listen… anymore… just let the sounds… wash over you.",
  "Drifting… floating… dissolving… into warmth.",
  "Sleep is here… welcoming you… wrapping around you… like silk.",
  "Let go now… completely… you are safe… you are loved… you are home.",
  "Sleep."
];

// Phase definitions: [startLine, endLine, pauseBetweenLines(ms)]
// 0: Welcome intro (1 line) - 4s pause after
// 1-13: Body scan relaxation (13 lines) - 5s gaps
// 14-15: Staircase intro (2 lines) - 6s gaps
// 16-25: Countdown Ten to One (10 lines) - 7s gaps
// 26-31: Enchanted garden (6 lines) - 8s gaps
// 32-38: Fade to sleep (7 lines) - 10s gaps
const PHASES = [
  [0, 0, 4000],
  [1, 13, 5000],
  [14, 15, 6000],
  [16, 25, 7000],
  [26, 31, 8000],
  [32, 38, 10000]
];

const TOTAL_LINES = 39;

// ==================== AUDIO ENGINE ====================
class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.ambientGain = null;
    this.voiceGain = null;
    this.volume = 0.7;
    this.paused = false;
    this.audioBuffers = new Array(TOTAL_LINES).fill(null);
    this.ambientBuffer = null;
    this.ambientSource = null;
    this.currentSource = null;
    this._pendingResolve = null;
  }

  init() {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
    this.masterGain = this.ctx.createGain();
    this.masterGain.gain.value = this.volume;
    this.masterGain.connect(this.ctx.destination);

    this.ambientGain = this.ctx.createGain();
    this.ambientGain.gain.value = 0;
    this.ambientGain.connect(this.masterGain);

    this.voiceGain = this.ctx.createGain();
    this.voiceGain.gain.value = 1.0;
    this.voiceGain.connect(this.masterGain);
  }

  async loadAudio(url) {
    const response = await fetch(url);
    const arrayBuffer = await response.arrayBuffer();
    return await this.ctx.decodeAudioData(arrayBuffer);
  }

  async preloadLine(index) {
    if (this.audioBuffers[index]) return;
    const num = String(index).padStart(2, '0');
    try {
      this.audioBuffers[index] = await this.loadAudio('audio/line_' + num + '.mp3');
    } catch(e) {
      console.warn('Failed to preload line', index, e);
    }
  }

  async preloadAmbient() {
    try {
      this.ambientBuffer = await this.loadAudio('audio/ambient.mp3');
    } catch(e) {
      console.warn('Failed to load ambient', e);
    }
  }

  startAmbient() {
    if (!this.ambientBuffer) return;
    this.ambientSource = this.ctx.createBufferSource();
    this.ambientSource.buffer = this.ambientBuffer;
    this.ambientSource.loop = true;
    this.ambientSource.connect(this.ambientGain);
    this.ambientSource.start();
    // Fade in over 5s
    this.ambientGain.gain.setValueAtTime(0, this.ctx.currentTime);
    this.ambientGain.gain.linearRampToValueAtTime(0.4, this.ctx.currentTime + 5);
  }

  setVolume(v) {
    this.volume = v;
    if (this.masterGain) this.masterGain.gain.setValueAtTime(v, this.ctx.currentTime);
  }

  playLine(lineIndex) {
    return new Promise(async (resolve) => {
      // Ensure line is loaded
      if (!this.audioBuffers[lineIndex]) {
        await this.preloadLine(lineIndex);
      }
      const buffer = this.audioBuffers[lineIndex];
      if (!buffer) { resolve(); return; }

      // Duck ambient slightly during voice
      if (this.ambientGain) {
        this.ambientGain.gain.linearRampToValueAtTime(0.2, this.ctx.currentTime + 0.5);
      }

      const source = this.ctx.createBufferSource();
      source.buffer = buffer;
      source.connect(this.voiceGain);
      this.currentSource = source;

      source.onended = () => {
        this.currentSource = null;
        // Restore ambient
        if (this.ambientGain) {
          this.ambientGain.gain.linearRampToValueAtTime(0.4, this.ctx.currentTime + 1);
        }
        resolve();
      };

      if (this.paused) {
        this._pendingResolve = () => { source.start(); };
      } else {
        source.start();
      }

      // Preload next 2 lines
      if (lineIndex + 1 < TOTAL_LINES) this.preloadLine(lineIndex + 1);
      if (lineIndex + 2 < TOTAL_LINES) this.preloadLine(lineIndex + 2);
    });
  }

  pause() {
    this.paused = true;
    if (this.ctx && this.ctx.state === 'running') this.ctx.suspend();
  }

  resume() {
    this.paused = false;
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
    if (this._pendingResolve) { this._pendingResolve(); this._pendingResolve = null; }
  }
}

// ==================== VISUAL ENGINE ====================
class VisualEngine {
  constructor() {
    this.bgCtx = null;
    this.mandalaCtx = null;
    this.particleCtx = null;
    this.particles = [];
    this.breathPhase = 0;
    this.breathSpeed = 0.008;
    this.running = false;
    this.w = 0;
    this.h = 0;
  }

  init() {
    this.bgCtx = document.getElementById('bgCanvas').getContext('2d');
    this.mandalaCtx = document.getElementById('mandalaCanvas').getContext('2d');
    this.particleCtx = document.getElementById('particleCanvas').getContext('2d');
    this.resize();
    window.addEventListener('resize', () => this.resize());
    for (let i = 0; i < 60; i++) {
      this.particles.push({
        x: Math.random() * this.w, y: Math.random() * this.h,
        r: Math.random() * 2 + 1,
        vx: (Math.random()-0.5) * 0.3, vy: (Math.random()-0.5) * 0.2 - 0.1,
        phase: Math.random() * Math.PI * 2,
        speed: Math.random() * 0.01 + 0.005,
        hue: 260 + Math.random() * 40
      });
    }
  }

  resize() {
    const dpr = window.devicePixelRatio || 1;
    this.w = window.innerWidth;
    this.h = window.innerHeight;
    ['bgCanvas','mandalaCanvas','particleCanvas'].forEach(id => {
      const c = document.getElementById(id);
      c.width = this.w * dpr;
      c.height = this.h * dpr;
      c.getContext('2d').scale(dpr, dpr);
    });
  }

  start() { this.running = true; this.animate(); }
  stop() { this.running = false; }

  animate() {
    if (!this.running) return;
    this.drawBackground();
    this.drawMandala();
    this.drawParticles();
    requestAnimationFrame(() => this.animate());
  }

  drawBackground() {
    const ctx = this.bgCtx;
    const g = ctx.createRadialGradient(this.w/2, this.h/2, 0, this.w/2, this.h/2, this.w*0.7);
    g.addColorStop(0, '#1a1030');
    g.addColorStop(0.5, '#110a22');
    g.addColorStop(1, '#0a0612');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, this.w, this.h);
  }

  drawMandala() {
    const ctx = this.mandalaCtx;
    ctx.clearRect(0, 0, this.w, this.h);
    const cx = this.w / 2, cy = this.h * 0.38;
    this.breathPhase += this.breathSpeed;
    const breathScale = 0.85 + 0.15 * Math.sin(this.breathPhase);
    const baseR = Math.min(this.w, this.h) * 0.18 * breathScale;
    const alpha = 0.15 + 0.1 * Math.sin(this.breathPhase);

    const glow = ctx.createRadialGradient(cx, cy, baseR*0.3, cx, cy, baseR*1.5);
    glow.addColorStop(0, 'rgba(140,100,220,'+alpha*0.5+')');
    glow.addColorStop(1, 'rgba(140,100,220,0)');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(cx, cy, baseR*1.5, 0, Math.PI*2);
    ctx.fill();

    for (let r = 0; r < 5; r++) {
      const ringR = baseR * (0.3 + r * 0.18);
      const petals = 6 + r * 2;
      const rot = this.breathPhase * 0.2 * (r%2===0?1:-1);
      ctx.strokeStyle = 'rgba(180,140,255,'+(alpha*(1-r*0.15))+')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      for (let p = 0; p < petals; p++) {
        const a = (p/petals)*Math.PI*2 + rot;
        const px = cx + Math.cos(a)*ringR, py = cy + Math.sin(a)*ringR;
        p===0 ? ctx.moveTo(px,py) : ctx.lineTo(px,py);
      }
      ctx.closePath();
      ctx.stroke();
      for (let p = 0; p < petals; p++) {
        const a = (p/petals)*Math.PI*2 + rot;
        ctx.fillStyle = 'rgba(212,197,240,'+alpha*0.8+')';
        ctx.beginPath();
        ctx.arc(cx+Math.cos(a)*ringR, cy+Math.sin(a)*ringR, 1.5, 0, Math.PI*2);
        ctx.fill();
      }
    }

    ctx.fillStyle = 'rgba(180,140,255,'+alpha*0.4+')';
    ctx.beginPath();
    ctx.arc(cx, cy, baseR*0.15, 0, Math.PI*2);
    ctx.fill();
  }

  drawParticles() {
    const ctx = this.particleCtx;
    ctx.clearRect(0, 0, this.w, this.h);
    this.particles.forEach(p => {
      p.phase += p.speed;
      p.x += p.vx; p.y += p.vy;
      if (p.x < -10) p.x = this.w+10;
      if (p.x > this.w+10) p.x = -10;
      if (p.y < -10) p.y = this.h+10;
      if (p.y > this.h+10) p.y = -10;
      const glow = 0.3 + 0.7 * Math.sin(p.phase);
      ctx.fillStyle = 'hsla('+p.hue+',60%,75%,'+glow*0.6+')';
      ctx.shadowColor = 'hsla('+p.hue+',70%,70%,'+glow*0.4+')';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r*(0.8+0.4*Math.sin(p.phase)), 0, Math.PI*2);
      ctx.fill();
    });
    ctx.shadowBlur = 0;
  }

  setDim(level) {
    document.getElementById('dimOverlay').style.opacity = level;
  }
}

// ==================== SESSION CONTROLLER ====================
class SessionController {
  constructor(audio, visuals) {
    this.audio = audio;
    this.visuals = visuals;
    this.running = false;
    this.paused = false;
    this.pausePromiseResolve = null;
    this._timer = null;
  }

  async start() {
    this.running = true;
    this.audio.init();
    this.visuals.init();
    this.visuals.start();

    // Wake lock
    try { if ('wakeLock' in navigator) await navigator.wakeLock.request('screen'); } catch(e) {}

    const loadMsg = document.getElementById('loadingMsg');
    loadMsg.textContent = 'Preparing your journey…';
    loadMsg.classList.add('visible');

    // Preload ambient + first few voice lines in parallel
    await Promise.all([
      this.audio.preloadAmbient(),
      this.audio.preloadLine(0),
      this.audio.preloadLine(1),
      this.audio.preloadLine(2),
      this.audio.preloadLine(3),
      this.audio.preloadLine(4)
    ]);

    loadMsg.classList.remove('visible');

    // Start ambient music
    this.audio.startAmbient();

    // Brief pause before voice begins
    await this.sleep(3000);

    // Play through all phases
    for (let pi = 0; pi < PHASES.length && this.running; pi++) {
      const [start, end, gap] = PHASES[pi];
      // Progressive dimming (skip intro phase for dim calculation)
      const dimTarget = Math.max(0, (pi - 1)) * 0.12;
      this.visuals.setDim(dimTarget);
      this.visuals.breathSpeed = Math.max(0.004, 0.008 - Math.max(0, pi-1) * 0.001);

      for (let li = start; li <= end && this.running; li++) {
        // Check pause
        if (this.paused) await new Promise(r => this.pausePromiseResolve = r);

        // Show subtitle
        const sub = document.getElementById('subtitleText');
        sub.textContent = LINES[li];
        sub.classList.add('visible');

        // Play audio line
        try { await this.audio.playLine(li); } catch(e) { console.warn('Line', li, e); }

        // Keep subtitle visible briefly then fade
        await this.sleep(1500);
        sub.classList.remove('visible');

        // Gap between lines
        await this.sleep(gap);
      }
    }

    // Final deep dim
    this.visuals.setDim(0.75);
    document.getElementById('subtitleText').textContent = '';
    document.getElementById('subtitleText').classList.remove('visible');
    // Ambient continues playing indefinitely for sleep
  }

  sleep(ms) {
    return new Promise(r => { this._timer = setTimeout(r, ms); });
  }

  togglePause() {
    if (this.paused) {
      this.paused = false;
      this.audio.resume();
      if (this.pausePromiseResolve) { this.pausePromiseResolve(); this.pausePromiseResolve = null; }
      document.getElementById('pauseBtn').textContent = 'Pause';
    } else {
      this.paused = true;
      this.audio.pause();
      document.getElementById('pauseBtn').textContent = 'Resume';
    }
  }
}

// ==================== INIT ====================
const audio = new AudioEngine();
const visuals = new VisualEngine();
const session = new SessionController(audio, visuals);

document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('sessionScreen').classList.add('active');
  setTimeout(() => session.start(), 500);
});

document.getElementById('pauseBtn').addEventListener('click', () => session.togglePause());

document.getElementById('volSlider').addEventListener('input', (e) => {
  audio.setVolume(e.target.value / 100);
});

document.getElementById('restartSlider').addEventListener('input', (e) => {
  const position = parseInt(e.target.value);
  if (position === 0) {
    // Reset to beginning
    audio.currentLine = 0;
    audio.stop();
    session.reset();
    session.start();
    e.target.value = 0; // Reset slider
  }
});
</script>
</body>
</html>
